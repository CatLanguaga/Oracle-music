services:
  postgres:
    image: postgres:16-alpine
    container_name: nyota-postgres
    environment:
      POSTGRES_USER: nyota
      POSTGRES_PASSWORD: nyota
      POSTGRES_DB: nyota
    ports:
      - "5432:5432"
    volumes:
      - nyota_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyota"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nyota-redis
    ports:
      - "6379:6379"
    volumes:
      - nyota_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nyota_pg_data:
  nyota_redis_data:
